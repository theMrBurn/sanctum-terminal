version: 0.1
cli:
  version: 1.25.0

plugins:
  sources:
    - id: trunk
      ref: v1.7.6
      uri: https://github.com/trunk-io/plugins

lint:
  enabled:
    - black@26.3.1
    - git-diff-check
    - markdownlint@0.48.0
    - prettier@3.8.1
    - ruff@0.15.6
    - trufflehog@3.93.8

actions:
  disabled:
    - trunk-announce
    - trunk-check-pre-push
    - trunk-fmt-pre-commit
  enabled:
    - trunk-upgrade-available
runtimes:
  enabled:
    - node@22.16.0
    - python@3.10.8
