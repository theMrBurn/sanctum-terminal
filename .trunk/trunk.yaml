version: 0.1
cli:
  version: 1.25.0

plugins:
  sources:
    - id: trunk
      ref: v1.7.6
      uri: https://github.com/trunk-io/plugins

lint:
  enabled:
    - bandit@1.9.4
    - checkov@3.2.511
    - isort@8.0.1
    - oxipng@10.1.0
    - shellcheck@0.11.0
    - shfmt@3.6.0
    - taplo@0.10.0
    - yamllint@1.38.0
    - black@26.3.1
    - git-diff-check
    - markdownlint@0.48.0
    - prettier@3.8.1
    - ruff@0.15.8
    - trufflehog@3.94.1

actions:
  disabled:
    - trunk-announce
    - trunk-check-pre-push
    - trunk-fmt-pre-commit
  enabled:
    - trunk-upgrade-available
runtimes:
  enabled:
    - go@1.21.0
    - node@22.16.0
    - python@3.10.8
